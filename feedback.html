<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback — SubSnitch</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--surface:#111;--border:rgba(255,255,255,.06);--text:#ccc;--text2:#888;--blue:#3b82f6;--red:#ef4444}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;line-height:1.7;-webkit-font-smoothing:antialiased}
a{color:var(--blue);text-decoration:none}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 24px;backdrop-filter:blur(20px);background:rgba(10,10,10,.7);border-bottom:1px solid var(--border)}
.nav-inner{max-width:800px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-weight:700;font-size:1.15rem;color:#fff;display:flex;align-items:center;gap:8px}
.logo svg{width:24px;height:24px}
nav a.back{color:var(--text2);font-size:.875rem}
nav a.back:hover{color:#fff}
main{max-width:800px;margin:0 auto;padding:120px 24px 80px}
h1{font-size:2rem;font-weight:800;color:#fff;margin-bottom:8px;letter-spacing:-.02em}
.subtitle{color:var(--text2);font-size:.925rem;margin-bottom:40px}

/* Form card */
.form-card{background:rgba(255,255,255,.03);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:20px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.form-group{margin-bottom:24px}
.form-group label{display:block;font-size:.85rem;font-weight:600;color:#ddd;margin-bottom:8px}
.form-group .optional{color:var(--text2);font-weight:400;font-size:.75rem}
.form-group input[type="text"],
.form-group input[type="email"],
.form-group select,
.form-group textarea{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-size:.9rem;font-family:inherit;transition:border-color .2s}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{outline:none;border-color:rgba(59,130,246,.4)}
.form-group select{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23888' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 16px center;padding-right:40px}
.form-group select option{background:#111;color:#ccc}
.form-group textarea{resize:vertical;min-height:140px}

/* Star rating - CSS-only with radio buttons */
.star-rating{display:flex;flex-direction:row-reverse;justify-content:flex-end;gap:4px}
.star-rating input{display:none}
.star-rating label{cursor:pointer;font-size:1.75rem;color:#333;transition:color .15s}
.star-rating label::before{content:'\2605'}
.star-rating input:checked ~ label,
.star-rating label:hover,
.star-rating label:hover ~ label{color:#f59e0b}

.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 36px;border-radius:12px;font-weight:600;font-size:.95rem;background:var(--blue);color:#fff;border:none;cursor:pointer;box-shadow:0 0 30px rgba(59,130,246,.25);transition:all .25s;width:100%;justify-content:center}
.btn:hover{background:#2563eb;transform:translateY(-1px);box-shadow:0 0 50px rgba(59,130,246,.35)}

.note{margin-top:24px;padding:16px 20px;border-radius:12px;background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.12);font-size:.8rem;color:#aaa;text-align:center}

footer{border-top:1px solid var(--border);padding:32px 24px;text-align:center;font-size:.75rem;color:#555;max-width:800px;margin:0 auto}
@media(max-width:600px){
  .form-card{padding:24px}
}
</style>
</head>
<body>
<nav><div class="nav-inner">
  <a href="/" class="logo"><svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="12" stroke="#3b82f6" stroke-width="2"/><circle cx="14" cy="14" r="5" fill="#3b82f6"/><line x1="18" y1="18" x2="24" y2="24" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/></svg> SubSnitch</a>
  <a href="blog/" class="back" style="margin-right:16px">Blog</a>
  <a href="/" class="back">&larr; Back to Home</a>
</div></nav>

<main>
<h1>Feedback</h1>
<p class="subtitle">Found a bug? Have an idea? We'd love to hear from you.</p>

<div class="form-card">
  <form action="https://formspree.io/f/feedback" method="POST">
    <div class="form-group">
      <label>Name <span class="optional">(optional)</span></label>
      <input type="text" name="name" placeholder="Your name">
    </div>
    <div class="form-group">
      <label>Email <span class="optional">(optional)</span></label>
      <input type="email" name="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Type</label>
      <select name="type" required>
        <option value="" disabled selected>Select feedback type</option>
        <option value="bug">Bug Report</option>
        <option value="feature">Feature Request</option>
        <option value="general">General Feedback</option>
      </select>
    </div>
    <div class="form-group">
      <label>Subject</label>
      <input type="text" name="subject" placeholder="Brief summary" required>
    </div>
    <div class="form-group">
      <label>Message</label>
      <textarea name="message" placeholder="Tell us the details..." required></textarea>
    </div>
    <div class="form-group">
      <label>Rating</label>
      <div class="star-rating">
        <input type="radio" id="star5" name="rating" value="5"><label for="star5" title="5 stars"></label>
        <input type="radio" id="star4" name="rating" value="4"><label for="star4" title="4 stars"></label>
        <input type="radio" id="star3" name="rating" value="3"><label for="star3" title="3 stars"></label>
        <input type="radio" id="star2" name="rating" value="2"><label for="star2" title="2 stars"></label>
        <input type="radio" id="star1" name="rating" value="1"><label for="star1" title="1 star"></label>
      </div>
    </div>
    <button type="submit" class="btn">Send Feedback</button>
  </form>
  <div class="note">We read every piece of feedback and typically respond within 48 hours.</div>
</div>
</main>

<footer>&copy; 2026 SubSnitch. Built with privacy in mind. &middot; <a href="privacy.html" style="color:#888">Privacy</a></footer>
</body>
</html>
