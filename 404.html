<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — SubSnitch</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e5e5e5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;overflow:hidden}
.container{position:relative;z-index:1;padding:24px}
.glitch{font-size:clamp(6rem,20vw,12rem);font-weight:900;letter-spacing:-.05em;position:relative;color:#fff;animation:glitch-skew 4s infinite linear alternate-reverse}
.glitch::before,.glitch::after{content:'404';position:absolute;top:0;left:0;width:100%;height:100%}
.glitch::before{color:#3b82f6;animation:glitch-1 2s infinite linear alternate-reverse;clip-path:polygon(0 0,100% 0,100% 45%,0 45%)}
.glitch::after{color:#ef4444;animation:glitch-2 3s infinite linear alternate-reverse;clip-path:polygon(0 55%,100% 55%,100% 100%,0 100%)}
@keyframes glitch-1{0%{transform:translate(0)}20%{transform:translate(-3px,3px)}40%{transform:translate(-3px,-3px)}60%{transform:translate(3px,3px)}80%{transform:translate(3px,-3px)}100%{transform:translate(0)}}
@keyframes glitch-2{0%{transform:translate(0)}20%{transform:translate(3px,-3px)}40%{transform:translate(3px,3px)}60%{transform:translate(-3px,-3px)}80%{transform:translate(-3px,3px)}100%{transform:translate(0)}}
@keyframes glitch-skew{0%{transform:skew(0deg)}2%{transform:skew(-1deg)}4%{transform:skew(0deg)}98%{transform:skew(0deg)}100%{transform:skew(1deg)}}
p{color:#888;font-size:1.1rem;margin:16px 0 40px}
a{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:10px;background:#3b82f6;color:#fff;text-decoration:none;font-weight:600;font-size:.9rem;box-shadow:0 0 30px rgba(59,130,246,.25);transition:all .25s}
a:hover{background:#2563eb;transform:translateY(-2px);box-shadow:0 0 50px rgba(59,130,246,.35)}
.bg{position:fixed;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.02) 1px,transparent 1px);background-size:32px 32px}
.glow{position:fixed;width:400px;height:400px;border-radius:50%;filter:blur(120px);opacity:.12;pointer-events:none}
.glow-1{background:#3b82f6;top:-100px;left:20%}
.glow-2{background:#ef4444;bottom:-100px;right:20%}
</style>
</head>
<body>
<div class="bg"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="container">
  <div class="glitch">404</div>
  <p>This page doesn't exist. No dark patterns here — just a dead end.</p>
  <a href="/">&larr; Back to Home</a>
</div>
</body>
</html>
