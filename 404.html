<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--cream:#f5f0e8;--black:#111;--red:#c41e1e;--gray:#666;--light-gray:#999;--serif:Georgia,'Times New Roman',Times,serif;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
body{background:var(--cream);color:var(--black);font-family:var(--sans);display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
.container{padding:24px}
.four-oh-four{font-family:var(--serif);font-size:clamp(8rem,25vw,14rem);font-weight:900;letter-spacing:-.05em;line-height:.85;color:var(--black);margin-bottom:24px}
.redacted{font-family:var(--serif);font-size:1.4rem;font-style:italic;color:var(--gray);margin-bottom:48px;position:relative;display:inline-block}
.redacted span{text-decoration:line-through;text-decoration-color:var(--red);text-decoration-thickness:2px}
.links{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.links a{display:inline-block;padding:10px 28px;font-size:.8rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;border:1px solid var(--black);color:var(--black);transition:all .2s}
.links a:hover{background:var(--black);color:var(--cream)}
.links a.primary{background:var(--black);color:var(--cream)}
.links a.primary:hover{background:var(--red);border-color:var(--red)}
.contact{margin-top:48px;font-size:.75rem;color:var(--light-gray)}
.contact a{color:var(--light-gray)}
.contact a:hover{color:var(--black)}
footer{border-top:1px solid var(--black);padding:40px 32px;margin-top:60px}
.footer-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.footer-note{font-size:.75rem;color:var(--light-gray)}
.footer-links{list-style:none;display:flex;gap:20px;flex-wrap:wrap}
.footer-links a{color:var(--gray);font-size:.75rem;text-decoration:none;letter-spacing:.03em}
.footer-links a:hover{color:var(--black)}
.footer-small{width:100%;font-size:.7rem;color:var(--light-gray);margin-top:8px;text-align:center}
</style>
</head>
<body>
<div class="container">

  <div class="links">

  </div>

</div>

    <div class="footer-note">&copy; 2026 SubSnitch</div>
    <ul class="footer-links">
      <li><a href="privacy.html">Privacy</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="feedback.html">Feedback</a></li>

      <li><a href="blog/">Blog</a></li>
      <li><a href="mailto:subsnitch@gmail.com">Contact</a></li>
    </ul>
    <div class="footer-small">Built with privacy in mind. No data ever leaves your browser.</div>
  </div>
</footer>
</body>
</html>
